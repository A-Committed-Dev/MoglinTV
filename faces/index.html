<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50
        }

        #popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 30, 30, 0.92);
            color: #fff;
            padding: 40px 60px;
            border-radius: 20px;
            font-size: 2em;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            z-index: 100;
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        #popup a, #popup a:visited, #popup a:active, #popup a:hover {
            text-decoration: none;
            color: inherit;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        #popup.show {
            display: block;
            opacity: 1;
            pointer-events: auto;
        }

        #popup.hide {
            opacity: 0
        }
    </style>
</head>

<body>
    <iframe id="f" src="/face"></iframe>
    <div id="overlay"></div>
    <div id="popup"><a href="/charpage"><img src="/assets/charpage.png" alt="Charpage"
            style="max-width:200px;display:block;margin:0 auto 16px"><span>Charpage</span></a></div>
    <script>
        let currentMood = "happy";
        const es = new EventSource("/events");
        es.onmessage = e => { currentMood = e.data; document.getElementById("f").src = "/face?t=" + Date.now(); };

        let hideTimer;
        document.getElementById("overlay").addEventListener("click", () => {
            fetch("/interact", { method: "POST" });
            if (currentMood === "sleeping") return;
            const p = document.getElementById("popup");
            clearTimeout(hideTimer);
            p.classList.remove("hide");
            p.classList.add("show");
            hideTimer = setTimeout(() => {
                p.classList.add("hide");
                setTimeout(() => p.classList.remove("show", "hide"), 300);
            }, 2000);
        });
    </script>
</body>

</html>
