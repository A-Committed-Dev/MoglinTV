<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
  <title>Angry Face</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #a52020; }

    .face {
      width: 100vw; height: 100vh;
      background: radial-gradient(ellipse at 50% 45%, #b22222 0%, #8b1a1a 80%, #6b0f0f 100%);
      display: flex; align-items: center; justify-content: center; position: relative;
    }

    /* Eyes - squinted */
    .eyes {
      position: absolute; top: 28%; left: 50%; transform: translateX(-50%);
      display: flex; gap: 12vw;
      animation: yellShake 3s ease-in-out infinite;
    }
    .eye {
      width: 10vw; height: 10vw; background: #000;
      border-radius: 50% 50% 45% 45% / 55% 55% 35% 35%;
      position: relative; overflow: hidden;
    }
    .eyelid {
      position: absolute; top: 0; left: -2px; right: -2px; height: 100%;
      background: #8b1a1a; border-radius: 50%;
      transform: translateY(-100%); transition: transform 0.15s ease; z-index: 2;
    }
    .eye-droop {
      position: absolute; top: 0; left: -2px; right: -2px;
      height: 50%; background: #8b1a1a; z-index: 1;
      border-radius: 0 0 30% 30%;
    }
    .left-eye .eye-droop { transform: rotate(12deg); transform-origin: right top; }
    .right-eye .eye-droop { transform: rotate(-12deg); transform-origin: left top; }
    .pupil-wrapper {
      width: 100%; height: 100%; position: absolute; top: 0; left: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .pupil {
      width: 2.8vw; height: 3.2vw; background: #fff; border-radius: 50%;
      position: relative; transition: transform 0.08s ease-out;
    }
    .left-eye .pupil { transform: translateX(0.8vw); }
    .right-eye .pupil { transform: translateX(-0.8vw); }

    /* Nose */
    .nose {
      position: absolute; top: 48%; left: 50%; transform: translateX(-50%);
      width: 4.5vw; height: 3vw; z-index: 3;
      animation: yellShake 3s ease-in-out infinite;
    }
    .nose-shape { width: 100%; height: 100%; }
    .nose-shape svg { width: 100%; height: 100%; display: block; }

    /* Mouth - angry clenched */
    .mouth {
      position: absolute; top: 56%; left: 50%; transform: translateX(-50%);
      width: 18vw; height: 12vw; overflow: visible;
      animation: yellShake 3s ease-in-out infinite;
    }
    .mouth-outer {
      width: 100%; height: 35%; background: #650017;
      border-radius: 5% 5% 50% 50%; border: 8px solid #31000b;
      position: relative; overflow: hidden;
      margin-top: 0.2vw;
      animation: yell 3s ease-in-out infinite;
    }
    .tongue {
      position: absolute; bottom: -15%; left: 50%; transform: translateX(-50%);
      width: 55%; height: 60%;
      background: radial-gradient(ellipse at 50% 30%, #e87a8a 0%, #c4576a 80%);
      border-radius: 50%;
    }
    .lip-mask {
      position: absolute; top: -1.5vw; left: -3vw;
      width: calc(100% + 6vw); height: 5vw;
      background: radial-gradient(ellipse at 50% 45%, #b22222 0%, #8b1a1a 80%, #6b0f0f 100%);
      background-size: 100vw 100vh;
      background-position: -38vw calc(-56vh + 1.5vw);
      clip-path: url(#lipClip);
      z-index: 2;
    }
    .mouth-curve {
      position: absolute; top: -1.5vw; left: -3vw; right: -3vw;
      width: calc(100% + 6vw); height: 5vw; z-index: 3;
    }
    .mouth-curve svg { width: 100%; height: 100%; display: block; }

    /* Anime anger vein */
    .anger-vein {
      position: absolute; top: 18%; right: 20%; z-index: 5;
      width: 5vw; height: 5vw;
      animation: veinThrob 0.8s ease-in-out infinite;
      transform: rotate(45deg);
    }
    .anger-vein svg { width: 100%; height: 100%; }
    @keyframes veinThrob {
      0%, 100% { transform: rotate(45deg) scale(1); }
      50% { transform: rotate(45deg) scale(1.3); }
    }

    @keyframes yell {
      0%, 70%, 100% { height: 35%; }
      80%, 90% { height: 100%; }
    }

    @keyframes yellShake {
      0%, 70% { transform: translateX(-50%); }
      80% { transform: translateX(calc(-50% + 0.3vw)); }
      81% { transform: translateX(calc(-50% - 0.25vw)); }
      82% { transform: translateX(calc(-50% + 0.2vw)); }
      83% { transform: translateX(calc(-50% - 0.3vw)); }
      84% { transform: translateX(calc(-50% + 0.15vw)); }
      85% { transform: translateX(calc(-50% - 0.2vw)); }
      86% { transform: translateX(calc(-50% + 0.25vw)); }
      87% { transform: translateX(calc(-50% - 0.15vw)); }
      88% { transform: translateX(calc(-50% + 0.3vw)); }
      89% { transform: translateX(calc(-50% - 0.2vw)); }
      90%, 100% { transform: translateX(-50%); }
    }

  </style>
</head>
<body>
  <div class="face">
    <!-- Anime anger vein -->
    <div class="anger-vein">
      <svg viewBox="0 0 40 40">
        <!-- Classic anime anger mark: four L-shaped hooks -->
        <path d="M5,16 L16,16 L16,5" fill="none" stroke="#c33" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M24,5 L24,16 L35,16" fill="none" stroke="#c33" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M35,24 L24,24 L24,35" fill="none" stroke="#c33" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M16,35 L16,24 L5,24" fill="none" stroke="#c33" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- Eyes -->
    <div class="eyes">
      <div class="eye left-eye" id="leftEye">
        <div class="eye-droop"></div>
        <div class="eyelid" id="leftEyelid"></div>
        <div class="pupil-wrapper"><div class="pupil" id="leftPupil"></div></div>
      </div>
      <div class="eye right-eye" id="rightEye">
        <div class="eye-droop"></div>
        <div class="eyelid" id="rightEyelid"></div>
        <div class="pupil-wrapper"><div class="pupil" id="rightPupil"></div></div>
      </div>
    </div>

    <!-- Nose -->
    <div class="nose">
      <div class="nose-shape">
        <svg viewBox="-5 -5 70 60" preserveAspectRatio="xMidYMid meet" overflow="visible">
          <polygon points="30,44 56,4 4,4" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="25" stroke-linejoin="round" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <!-- Mouth - angry clenched -->
    <div class="mouth">
      <div class="mouth-outer">
        <div class="tongue"></div>
      </div>
      <svg width="0" height="0" style="position: absolute;">
        <defs>
          <clipPath id="lipClip" clipPathUnits="objectBoundingBox">
            <path d="M0.0417,0.0857 L0.025,0.2571 Q0.025,0.9 0.2583,0.9 Q0.375,0.9 0.5,0.5286 Q0.625,0.9 0.7417,0.9 Q0.975,0.9 0.975,0.2571 L0.9583,0.0857 L0.9583,0 L0.0417,0 Z"/>
          </clipPath>
        </defs>
      </svg>
      <div class="lip-mask"></div>
      <div class="mouth-curve">
        <svg viewBox="-20 -25 240 70" preserveAspectRatio="none">
          <path d="M-10,-19 L-14,-7 Q-14,38 42,38 Q70,38 100,12 Q130,38 158,38 Q214,38 214,-7 L210,-19" fill="none" stroke="#31000b" stroke-width="4" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
  </div>

  <script>
    const leftEyelid = document.getElementById('leftEyelid');
    const rightEyelid = document.getElementById('rightEyelid');

    function blink() {
      leftEyelid.style.transform = 'translateY(0%)';
      rightEyelid.style.transform = 'translateY(0%)';
      setTimeout(() => {
        leftEyelid.style.transform = 'translateY(-100%)';
        rightEyelid.style.transform = 'translateY(-100%)';
      }, 150);
      setTimeout(blink, 4000 + Math.random() * 5000);
    }
    setTimeout(blink, 3000);
  </script>
</body>
</html>
