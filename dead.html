<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
  <title>Dead Face</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #4a4040; }

    .face {
      width: 100vw; height: 100vh;
      background: radial-gradient(ellipse at 50% 45%, #7a6060 0%, #5a4040 80%, #3a2828 100%);
      display: flex; align-items: center; justify-content: center; position: relative;
    }

    /* Eyes with X marks */
    .eyes {
      position: absolute; top: 28%; left: 50%; transform: translateX(-50%);
      display: flex; gap: 12vw;
    }
    .eye {
      width: 10vw; height: 10vw;
      position: relative; overflow: visible;
      display: flex; align-items: center; justify-content: center;
    }
    .eye svg { width: 100%; height: 100%; }

    /* Nose */
    .nose {
      position: absolute; top: 48%; left: 50%; transform: translateX(-50%);
      width: 4.5vw; height: 3vw; z-index: 3;
    }
    .nose-shape { width: 100%; height: 100%; }
    .nose-shape svg { width: 100%; height: 100%; display: block; }

    /* Mouth */
    .mouth {
      position: absolute; top: 56%; left: 50%; transform: translateX(-50%);
      width: 18vw; height: 12vw; overflow: visible;
    }
    .lip-mask {
      position: absolute; top: 0; left: -3vw;
      width: calc(100% + 6vw); height: 5vw;
      background: radial-gradient(ellipse at 50% 45%, #7a6060 0%, #5a4040 80%, #3a2828 100%);
      background-size: 100vw 100vh;
      background-position: -38vw -56vh;
      clip-path: url(#lipClip);
      z-index: 2;
    }
    .mouth-curve {
      position: absolute; top: 0; left: -3vw; right: -3vw;
      width: calc(100% + 6vw); height: 5vw; z-index: 3;
    }
    .mouth-curve svg { width: 100%; height: 100%; display: block; }
    .tongue {
      position: absolute; top: 0vw; left: 50%; transform: translateX(-50%);
      width: 8vw; height: 10vw;
      background: radial-gradient(ellipse at 50% 30%, #9a5a5a 0%, #7a4a4a 80%);
      border-radius: 40% 40% 50% 50%;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="face">
    <!-- Eyes with X marks -->
    <div class="eyes">
      <div class="eye">
        <svg viewBox="0 0 100 100">
          <line x1="20" y1="20" x2="80" y2="80" stroke="#000" stroke-width="12" stroke-linecap="round"/>
          <line x1="80" y1="20" x2="20" y2="80" stroke="#000" stroke-width="12" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="eye">
        <svg viewBox="0 0 100 100">
          <line x1="20" y1="20" x2="80" y2="80" stroke="#000" stroke-width="12" stroke-linecap="round"/>
          <line x1="80" y1="20" x2="20" y2="80" stroke="#000" stroke-width="12" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <!-- Nose -->
    <div class="nose">
      <div class="nose-shape">
        <svg viewBox="-5 -5 70 60" preserveAspectRatio="xMidYMid meet" overflow="visible">
          <polygon points="30,44 56,4 4,4" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="25" stroke-linejoin="round" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <!-- SVG clip path for lip shape -->
    <svg width="0" height="0" style="position: absolute;">
      <defs>
        <clipPath id="lipClip" clipPathUnits="objectBoundingBox">
          <path d="M0.0417,0.0857 L0.025,0.2571 Q0.025,0.9 0.2583,0.9 Q0.375,0.9 0.5,0.5286 Q0.625,0.9 0.7417,0.9 Q0.975,0.9 0.975,0.2571 L0.9583,0.0857 L0.9583,0 L0.0417,0 Z"/>
        </clipPath>
      </defs>
    </svg>

    <!-- Mouth - just lips with tongue hanging out -->
    <div class="mouth">
      <div class="tongue"></div>
      <div class="lip-mask"></div>
      <div class="mouth-curve">
        <svg viewBox="-20 -25 240 70" preserveAspectRatio="none">
          <path d="M-10,-19 L-14,-7 Q-14,38 42,38 Q70,38 100,12 Q130,38 158,38 Q214,38 214,-7 L210,-19" fill="none" stroke="#2a1515" stroke-width="4" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
  </div>
</body>
</html>
