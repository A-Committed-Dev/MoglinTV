<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
  <title>Dizzy Face</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #a52020; }

    .face {
      width: 100vw; height: 100vh;
      background: radial-gradient(ellipse at 50% 45%, #b22222 0%, #8b1a1a 80%, #6b0f0f 100%);
      display: flex; align-items: center; justify-content: center; position: relative; transform: scale(1.4); 
    }

    /* Eyes with spiral pupils */
    .eyes {
      position: absolute; top: 28%; left: 50%; transform: translateX(-50%);
      display: flex; gap: 12vw;
    }
    .eye {
      width: 10vw; height: 10vw; background: transparent;
      position: relative; overflow: visible;
      display: flex; align-items: center; justify-content: center;
    }
    .spiral {
      width: 20vw; height: 20vw;
      flex-shrink: 0;
      animation: spin 1.5s linear infinite;
    }
    .spiral svg { width: 100%; height: 100%; }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }



    /* Nose */
    .nose {
      position: absolute; top: 48%; left: 50%; transform: translateX(-50%);
      width: 4.5vw; height: 3vw; z-index: 3;
    }
    .nose-shape { width: 100%; height: 100%; }
    .nose-shape svg { width: 100%; height: 100%; display: block; }

    /* Mouth - crooked dizzy mouth */
    .mouth {
      position: absolute; top: 56%; left: 50%; transform: translateX(-50%) rotate(-5deg);
      width: 18vw; height: 12vw; overflow: visible;
    }
    .mouth-outer {
      width: 80%; height: 38%; background: #650017;
      border-radius: 40% 60% 50% 40%;
      border: 5px solid #31000b;
      position: relative; overflow: hidden;
      margin: 0 auto;
    }
    .tongue {
      position: absolute; bottom: -15%; left: 50%; transform: translateX(-50%);
      width: 55%; height: 60%;
      background: radial-gradient(ellipse at 50% 30%, #e87a8a 0%, #c4576a 80%);
      border-radius: 50%;
    }
    .drool {
      position: absolute; top: 20%; left: 10%;
      width: 2.5vw; height: 4vw;
      background: rgba(180, 210, 255, 0.7);
      border-radius: 50% 50% 60% 60%;
      animation: droolDrop 10s ease-in-out infinite alternate;
      z-index: 1;
      rotate: 8deg;
    }
    @keyframes droolDrop {
      0% { transform: translateY(0) scaleY(1) ; opacity: 1; }
      5% { transform: translateY(0) scaleY(1); opacity: 1; }
      100% { transform: translateY(2vw) scaleY(3); opacity: 1; }
    }
    .lip-mask {
      position: absolute; top: -1.5vw; left: -3vw;
      width: calc(100% + 6vw); height: 5vw;
      background: radial-gradient(ellipse at 50% 45%, #b22222 0%, #8b1a1a 80%, #6b0f0f 100%);
      background-size: 100vw 100vh;
      background-position: -38vw calc(-56vh + 1.5vw);
      clip-path: url(#lipClip);
      z-index: 2;
    }
    .mouth-curve {
      position: absolute; top: -1.5vw; left: -3vw; right: -3vw;
      width: calc(100% + 6vw); height: 5vw; z-index: 3;
    }
    .mouth-curve svg { width: 100%; height: 100%; display: block; }


  </style>
</head>
<body>
  <div class="face">
    <!-- Eyes with spinning spirals -->
    <div class="eyes">
      <div class="eye" id="leftEye">
        <div class="spiral">
          <svg viewBox="0 0 100 100">
            <path d="M50,50 A5,5 0 0,1 40,50 A10,10 0 0,1 60,50 A15,15 0 0,1 30,50 A20,20 0 0,1 70,50 A25,25 0 0,1 20,50" fill="none" stroke="#111" stroke-width="4" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
      <div class="eye" id="rightEye">
        <div class="spiral">
          <svg viewBox="0 0 100 100">
            <path d="M50,50 A5,5 0 0,1 40,50 A10,10 0 0,1 60,50 A15,15 0 0,1 30,50 A20,20 0 0,1 70,50 A25,25 0 0,1 20,50" fill="none" stroke="#111" stroke-width="4" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Nose -->
    <div class="nose">
      <div class="nose-shape">
        <svg viewBox="-5 -5 70 60" preserveAspectRatio="xMidYMid meet" overflow="visible">
          <polygon points="30,44 56,4 4,4" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="25" stroke-linejoin="round" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <!-- Mouth - crooked dizzy mouth -->
    <div class="mouth">
      <svg width="0" height="0" style="position: absolute;">
        <defs>
          <clipPath id="lipClip" clipPathUnits="objectBoundingBox">
            <path d="M0.0417,0.0857 L0.025,0.2571 Q0.025,0.9 0.2583,0.9 Q0.375,0.9 0.5,0.5286 Q0.625,0.9 0.7417,0.9 Q0.975,0.9 0.975,0.2571 L0.9583,0.0857 L0.9583,0 L0.0417,0 Z"/>
          </clipPath>
        </defs>
      </svg>
      <div class="mouth-outer">
        <div class="tongue"></div>
      </div>
      <div class="drool"></div>
      <div class="lip-mask"></div>
      <div class="mouth-curve">
        <svg viewBox="-20 -25 240 70" preserveAspectRatio="none">
          <path d="M-10,-19 L-14,-7 Q-14,38 42,38 Q70,38 100,12 Q130,38 158,38 Q214,38 214,-7 L210,-19" fill="none" stroke="#31000b" stroke-width="4" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
  </div>


</body>
</html>
